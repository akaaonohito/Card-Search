<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポケモンカード検索</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ポケモンカード検索</h1>
        
        <div class="search-section">
            <label for="searchInput">カード検索</label>
            <input type="text" id="searchInput" placeholder="例：ハギギシリ / sv7a 068 / 068/064" autocomplete="off">
        </div>

        <div class="results-section">
            <ul id="suggestionList" class="suggestion-list"></ul>
            <div id="statusMessage" class="status-message"></div>
        </div>

        <div class="output-section">
            <label for="outputInput">コピー用文字列</label>
            <div class="output-row">
                <input type="text" id="outputInput">
                <button id="copyButton">コピー</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
